# Weekly smoke test for the multi-tenant clients permission model (PR #53).
#
# Runs end-to-end as Kat (account_user, account 2) against prod:
#   list -> get -> update -> create -> verify UCA -> cleanup.
# Hard-fails on any 4xx/5xx. Cleanup runs even on prior failure.
#
# REQUIRED REPO SECRETS (Settings -> Secrets and variables -> Actions):
#   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY  IAM creds with: rds-via-public-endpoint reachability,
#                                             s3:DeleteObject + s3:ListBucket on xo-client-data-mv,
#                                             (Lambda read not needed; JWT_SECRET is a secret already).
#   RDS_HOST                                  e.g. xo-quickstart-db.c9g8ymsccljy.eu-west-2.rds.amazonaws.com
#   RDS_DATABASE                              xo_quickstart
#   RDS_USER                                  xo_admin
#   RDS_PASSWORD                              Postgres password for RDS_USER
#   JWT_SECRET                                Same value as xo-clients Lambda env JWT_SECRET
#   KAT_USER_ID                               5ba658e3-498b-4604-b495-c65d7196cbc6
#   KAT_EMAIL                                 katherine.cordell@intellistack.com
#   KAT_ACCOUNT_ID                            2
#   ASSIGNED_CLIENT_ID                        s3_folder string of a stable client Kat is assigned to
#                                             (e.g. client_1777415168_0014326d for Allianz). Used by
#                                             steps c and d. Pick one that is unlikely to be deleted.
#
# Manual run: Actions tab -> "UCA permission smoke (weekly)" -> Run workflow.

name: UCA permission smoke (weekly)

on:
  schedule:
    - cron: "0 16 * * 2"  # Tuesdays 16:00 UTC = 09:00 America/Los_Angeles (PDT)
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    name: Smoke as Kat (account_user, account 2)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      API_BASE: https://odvopohlp3.execute-api.eu-west-2.amazonaws.com/prod
      AWS_DEFAULT_REGION: eu-west-2
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      PGHOST: ${{ secrets.RDS_HOST }}
      PGDATABASE: ${{ secrets.RDS_DATABASE }}
      PGUSER: ${{ secrets.RDS_USER }}
      PGPASSWORD: ${{ secrets.RDS_PASSWORD }}
      PGSSLMODE: require
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      KAT_USER_ID: ${{ secrets.KAT_USER_ID }}
      KAT_EMAIL: ${{ secrets.KAT_EMAIL }}
      KAT_ACCOUNT_ID: ${{ secrets.KAT_ACCOUNT_ID }}
      ASSIGNED_CLIENT_ID: ${{ secrets.ASSIGNED_CLIENT_ID }}

    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies (PyJWT, psycopg2, awscli)
        run: |
          python -m pip install --upgrade pip
          pip install "PyJWT>=2.8" "psycopg2-binary>=2.9" "requests>=2.31"
          # awscli already installed on ubuntu-latest runners; verify.
          aws --version
          # Postgres client for ad-hoc psql if needed.
          sudo apt-get update -qq && sudo apt-get install -y -qq postgresql-client

      - name: Step a — Mint short-lived JWT for Kat
        id: mint
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import os, jwt
          from datetime import datetime, timezone, timedelta
          payload = {
              "user_id": os.environ["KAT_USER_ID"],
              "email": os.environ["KAT_EMAIL"],
              "name": "Kat Cordell",
              "role": "client",
              "is_admin": False,
              "is_account": False,
              "is_client": True,
              "account_id": int(os.environ["KAT_ACCOUNT_ID"]),
              "account_role": "account_user",
              "exp": datetime.now(timezone.utc) + timedelta(minutes=15),
          }
          token = jwt.encode(payload, os.environ["JWT_SECRET"], algorithm="HS256")
          print(f"::add-mask::{token}")
          print(f"jwt={token}")
          PY

      - name: Step b — GET /clients/list (expect ≥1 client)
        env:
          KAT_JWT: ${{ steps.mint.outputs.jwt }}
        run: |
          set -euo pipefail
          http_code=$(curl -s -o /tmp/list.json -w "%{http_code}" \
            -H "Authorization: Bearer $KAT_JWT" "$API_BASE/clients/list")
          echo "HTTP $http_code"
          if [ "$http_code" != "200" ]; then
            echo "::error::list returned $http_code"
            cat /tmp/list.json
            exit 1
          fi
          count=$(python -c "import json; print(len(json.load(open('/tmp/list.json')).get('clients',[])))")
          echo "Returned $count clients"
          if [ "$count" -lt 1 ]; then
            echo "::error::expected ≥1 client, got $count"
            cat /tmp/list.json
            exit 1
          fi

      - name: Step c — GET /clients?client_id=$ASSIGNED_CLIENT_ID (expect 200, valid shape)
        env:
          KAT_JWT: ${{ steps.mint.outputs.jwt }}
        run: |
          set -euo pipefail
          http_code=$(curl -s -o /tmp/get.json -w "%{http_code}" \
            -H "Authorization: Bearer $KAT_JWT" \
            "$API_BASE/clients?client_id=$ASSIGNED_CLIENT_ID")
          echo "HTTP $http_code"
          if [ "$http_code" != "200" ]; then
            echo "::error::get returned $http_code"
            cat /tmp/get.json
            exit 1
          fi
          python - <<'PY'
          import json, os
          d = json.load(open("/tmp/get.json"))
          assert d.get("client_id") == os.environ["ASSIGNED_CLIENT_ID"], f"client_id mismatch: {d.get('client_id')}"
          assert d.get("company_name"), "company_name missing or empty"
          print(f"OK: {d['company_name']} ({d['client_id']})")
          # Stash company_name for the no-op PUT echo.
          with open("/tmp/company_name.txt","w") as f:
              f.write(d["company_name"])
          PY

      - name: Step d — PUT /clients (no-op echo; expect 200)
        env:
          KAT_JWT: ${{ steps.mint.outputs.jwt }}
        run: |
          set -euo pipefail
          company_name=$(cat /tmp/company_name.txt)
          payload=$(python -c "import json,os; print(json.dumps({'client_id': os.environ['ASSIGNED_CLIENT_ID'], 'company_name': open('/tmp/company_name.txt').read()}))")
          http_code=$(curl -s -o /tmp/put.json -w "%{http_code}" \
            -X PUT -H "Authorization: Bearer $KAT_JWT" -H "Content-Type: application/json" \
            -d "$payload" "$API_BASE/clients")
          echo "HTTP $http_code"
          if [ "$http_code" != "200" ]; then
            echo "::error::put returned $http_code"
            cat /tmp/put.json
            exit 1
          fi
          status=$(python -c "import json; print(json.load(open('/tmp/put.json')).get('status',''))")
          if [ "$status" != "updated" ]; then
            echo "::error::expected status=updated, got status=$status"
            cat /tmp/put.json
            exit 1
          fi

      - name: Step e — POST /clients (throwaway; expect 200, capture ids)
        id: throwaway
        env:
          KAT_JWT: ${{ steps.mint.outputs.jwt }}
        run: |
          set -euo pipefail
          ts=$(date +%s)
          payload="{\"company_name\":\"Smoke-UCA-Throwaway-${ts}\"}"
          http_code=$(curl -s -o /tmp/post.json -w "%{http_code}" \
            -X POST -H "Authorization: Bearer $KAT_JWT" -H "Content-Type: application/json" \
            -d "$payload" "$API_BASE/clients")
          echo "HTTP $http_code"
          if [ "$http_code" != "200" ]; then
            echo "::error::post returned $http_code"
            cat /tmp/post.json
            exit 1
          fi
          db_id=$(python -c "import json; print(json.load(open('/tmp/post.json'))['id'])")
          s3_folder=$(python -c "import json; print(json.load(open('/tmp/post.json'))['client_id'])")
          echo "throwaway_db_id=$db_id" >> "$GITHUB_OUTPUT"
          echo "throwaway_s3_folder=$s3_folder" >> "$GITHUB_OUTPUT"
          echo "Created throwaway: db_id=$db_id, s3_folder=$s3_folder"

      - name: Step f — Verify UCA row inserted for Kat against new client
        env:
          THROWAWAY_DB_ID: ${{ steps.throwaway.outputs.throwaway_db_id }}
        run: |
          set -euo pipefail
          rows=$(psql -At -c "SELECT COUNT(*) FROM user_client_assignments \
            WHERE user_id = '$KAT_USER_ID'::uuid \
              AND client_id = '$THROWAWAY_DB_ID'::uuid;")
          echo "UCA rows for (Kat, throwaway) = $rows"
          if [ "$rows" != "1" ]; then
            echo "::error::expected exactly 1 UCA row for creator; got $rows"
            exit 1
          fi

      - name: Step g — Cleanup throwaway (always runs)
        if: always() && steps.throwaway.outputs.throwaway_db_id != ''
        env:
          THROWAWAY_DB_ID: ${{ steps.throwaway.outputs.throwaway_db_id }}
          THROWAWAY_S3_FOLDER: ${{ steps.throwaway.outputs.throwaway_s3_folder }}
        run: |
          set -euo pipefail
          echo "--- DB cleanup ---"
          psql -v ON_ERROR_STOP=1 <<SQL
          BEGIN;
          DELETE FROM uploads WHERE client_id = '$THROWAWAY_DB_ID'::uuid;
          DELETE FROM document_analyses WHERE client_id = '$THROWAWAY_DB_ID'::uuid;
          DELETE FROM enrichments WHERE client_id = '$THROWAWAY_DB_ID'::uuid;
          DELETE FROM user_client_assignments WHERE client_id = '$THROWAWAY_DB_ID'::uuid;
          DELETE FROM skills WHERE client_id = '$THROWAWAY_DB_ID';
          DELETE FROM clients WHERE id = '$THROWAWAY_DB_ID'::uuid;
          COMMIT;
          SQL
          echo "--- S3 cleanup ---"
          aws s3 rm "s3://xo-client-data-mv/$THROWAWAY_S3_FOLDER/" --recursive
          echo "Cleanup complete."

      - name: Summary
        if: always()
        run: |
          {
            echo "# UCA permission smoke summary"
            echo ""
            echo "- API_BASE: \`$API_BASE\`"
            echo "- ASSIGNED_CLIENT_ID: \`${ASSIGNED_CLIENT_ID:-unset}\`"
            echo "- Throwaway db_id: \`${{ steps.throwaway.outputs.throwaway_db_id }}\`"
            echo "- Throwaway s3_folder: \`${{ steps.throwaway.outputs.throwaway_s3_folder }}\`"
            echo ""
            echo "If any earlier step failed, check the step log above."
          } >> "$GITHUB_STEP_SUMMARY"
